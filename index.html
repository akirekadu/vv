<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      color: black;
      margin: 40px;
      line-height: 1.8;
      font-size: 16px;
    }
    .loading {
      color: #999;
    }
  </style>
</head>
<body>
  <div id="content"><span class="loading">Loading…</span></div>

  <script>
    // Replace with your Apps Script Web App URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMnHMT_tsCd5AJC_omizhhBeG0qrSJ94qkz-N2NQxyH2Muy-J3BQn4umm2wkV3_W-PjQ/exec';

    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('content');
        const lines = data.lines.filter(line => line.trim() !== '');
        container.innerHTML = lines.map(line => `<div>${line}</div>`).join('');
        if (lines.length === 0) container.innerHTML = '<div class="loading">No data found.</div>';
      })
      .catch(err => {
        console.error(err);
        document.getElementById('content').innerHTML = '<div class="loading">Failed to load data.</div>';
      });
  </script>
</body>
</html>
