<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 800px;
    height: 480px;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Verdana, sans-serif;
    text-align: center;
    line-height: 1.6;
    overflow: hidden;
  }
  #quote {
    max-width: 760px;
    font-size: 3rem;
  }
</style>
</head>
<body>
  <p id="quote"></p>
  <script>
    fetch('https://raw.githubusercontent.com/akirekadu/vv/refs/heads/master/quote.txt')
      .then(res => res.text())
      .then(text => {
        document.getElementById('quote').innerHTML = text
          .split('\n')
          .map(line => line.trim())
          .filter(line => line.length > 0)
          .join('<br>');
      });
  </script>
</body>
</html>
