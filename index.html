<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    #content {
      display: block;
      width: 100%;
      height: 100%;
      padding: 20px;
      font-family: monospace;
      font-size: 1rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <pre id="content">Loading...</pre>
  <script>
    fetch('https://raw.githubusercontent.com/akirekadu/vv/refs/heads/master/quote.txt')
      .then(res => res.text())
      .then(text => document.getElementById('content').textContent = text)
      .catch(err => document.getElementById('content').textContent = 'Error: ' + err);
  </script>
</body>
</html>
